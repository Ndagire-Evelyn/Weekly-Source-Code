<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Master - Interactive Quiz Application</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="main-wrapper">
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
      <div class="card">
        <div class="header-icon">📚</div>
        <h1>Quiz Master</h1>
        <p class="subtitle">Test your knowledge and have fun!</p>
        
        <div class="form-group">
          <label for="username">Your Name:</label>
          <input type="text" id="username" placeholder="Enter your name" autocomplete="on">
        </div>
        
        <div class="form-group">
          <label for="quiz-category">Select Category:</label>
          <select id="quiz-category">
            <option value="general">General Knowledge</option>
            <option value="tech">Technology</option>
            <option value="science">Science</option>
          </select>
        </div>
        
        <button id="start-btn" class="btn btn-primary">Start Quiz</button>
        <div id="history-preview" class="history-preview"></div>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
      <div class="quiz-container">
        <div class="quiz-header">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <div class="quiz-info">
            <span class="question-counter">Question <span id="current-q">1</span> of <span id="total-q">5</span></span>
            <span id="timer" class="timer">⏱️ <span id="time">15</span>s</span>
          </div>
        </div>
        
        <div class="card">
          <h2 id="question" class="question-text"></h2>
          <div id="options" class="options-container"></div>
          <p id="feedback" class="feedback"></p>
          <button id="next-btn" class="btn btn-next">Next Question</button>
        </div>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="result-screen" class="screen">
      <div class="card results-card">
        <div class="results-header">🎉 Quiz Complete!</div>
        <h2 id="user-result-name"></h2>
        
        <div class="score-display">
          <div class="score-circle">
            <div class="score-number"><span id="final-score">0</span>/<span id="total-score">5</span></div>
            <div class="score-label">Your Score</div>
          </div>
          <div class="score-percentage">
            <div class="percentage" id="percentage">0%</div>
            <div class="performance-message" id="performance-msg"></div>
          </div>
        </div>
        
        <div class="results-stats">
          <div class="stat">
            <span class="stat-label">Correct</span>
            <span class="stat-value" id="correct-count">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Incorrect</span>
            <span class="stat-value" id="incorrect-count">0</span>
          </div>
        </div>
        
        <div class="action-buttons">
          <button id="retry-btn" class="btn btn-primary">Retake Quiz</button>
          <button id="home-btn" class="btn btn-secondary">Back to Home</button>
        </div>
        
        <div id="history" class="quiz-history"></div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
